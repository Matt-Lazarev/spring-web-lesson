<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form action="/register" method="post" th:object="${user}">
    <label> Username:
        <input type="text" th:field="*{username}" required>
    </label>
    <br>
    <label> Password:
        <input type="password" th:field="*{password}" required>
    </label>
    <br>
    <button type="submit"> Register </button>
</form>

</body>
</html>
